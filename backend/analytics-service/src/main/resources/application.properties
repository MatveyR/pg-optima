server.port=8081
server.servlet.context-path=/

spring.application.name=analytics-service

# Database for analytics service (own storage)
spring.datasource.url=jdbc:postgresql://localhost:5432/pgoptima-analytics
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Feign client for user-service
user.service.url=http://localhost:8082

# Analysis configuration
pgoptima.analysis.auto-apply=false
pgoptima.analysis.allow-modifying-queries=false
pgoptima.analysis.max-apply-time-sec=30
pgoptima.analysis.seq-scan-threshold=1000
pgoptima.analysis.high-buffer-threshold=10000
pgoptima.analysis.index-scan-row-threshold=10000
pgoptima.analysis.cache-hit-ratio-threshold=0.8
pgoptima.analysis.high-execution-time-ms=5000
pgoptima.analysis.max-join-count=5

# Caching
pgoptima.performance.cache-size=1000
pgoptima.performance.cache-ttl-sec=300

# Logging
logging.level.com.pgoptima.analyticsservice=DEBUG

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true