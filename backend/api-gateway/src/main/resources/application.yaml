server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8083
          predicates:
          - Path=/api/v1/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/connections/**,/api/v1/projects/**
        - id: analytics-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/optimization/**

        - id: auth-service-openapi
          uri: http://localhost:8083
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs
        - id: user-service-openapi
          uri: http://localhost:8082
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - RewritePath=/v3/api-docs/user, /v3/api-docs
        - id: analytics-service-openapi
          uri: http://localhost:8081
          predicates:
            - Path=/v3/api-docs/analytics
          filters:
            - RewritePath=/v3/api-docs/analytics, /v3/api-docs

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
  main:
    web-application-type: reactive

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth
      - name: User Service
        url: /v3/api-docs/user
      - name: Analytics Service
        url: /v3/api-docs/analytics
    urls-primary-name: Auth Service

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  issuer: pgoptima-auth-service

logging:
  level:
    com.pgoptima.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info